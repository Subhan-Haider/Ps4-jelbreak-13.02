name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Check for Linting errors
        run: npm run lint
        
      - name: Build project
        run: npm run build
        
      - name: Upload build artifact (dry run)
        uses: actions/upload-artifact@v4
        with:
          name: preview-build
          path: dist/
